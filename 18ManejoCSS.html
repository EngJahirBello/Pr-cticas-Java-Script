<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estilo Dinámico con JavaScript</title>
    
    <style id='e1_style'>
        #e1 {
            font-weight: bold;
            font-size: 115%;
            color: green;
        }
    </style>

    <style>
        .btn-volver-abajo {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.3s;
        }
        .btn-volver-abajo:hover {
            background-color: #3498db;
        }
    </style>
</head>

<body>
    <h1>Estilo dinámico: Manipulación de CSS con JavaScript</h1>
    <hr>

    <h2>Accediendo a estilos</h2>
    <p>
        El ejemplo muestra como acceder, crear, y eliminar estilos.
        Presione el botón para agregar o eliminar el estilo.
    </p>

    <input id="tss" class='button' type='button' value="toggleStyleSheet()" />
    
    <br><br>

    <div id='e1' class="example">
        Número de estilos aplicados en la página: <strong><span id="numOfStyleSheets"></span></strong>
    </div>
    
    <a href="index.html" class="btn-volver-abajo">← Volver al Menú</a>

    <script src="js/18ManejoCSS.js"></script>
</body>
</html>
